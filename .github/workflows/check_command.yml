name: Check for "update now" command

on:
  schedule:
    - cron: "*/5 * * * *"   # каждые 5 минут — проверяем, не нажата ли кнопка/не написана ли команда
  workflow_dispatch: {}

permissions:
  contents: write   # чтобы сохранять update_offset.json обратно в репозиторий
  actions: write    # чтобы уметь запускать основной workflow (vacancy_digest.yml) по API

# Не даём двум запускам этого workflow (каждые 5 минут) наложиться друг на друга —
# следующий подождёт, пока текущий завершит commit/push.
concurrency:
  group: check-command
  cancel-in-progress: false

jobs:
  check-command:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Telegram for the update command
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python check_command.py

      - name: Save updated offset and sources
        run: |
          git config user.name "vacancy-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add update_offset.json sources.json
          git diff --quiet --cached || git commit -m "chore: update telegram offset / sources [skip ci]"
          # vacancy_digest.yml тоже коммитит в этот репозиторий (seen.json) — если он
          # успел запушить, пока мы работали, обычный push будет отклонён. Подтягиваем
          # свежие изменения и пробуем снова, вместо того чтобы просто упасть с ошибкой.
          for i in 1 2 3 4 5; do
            git push && break
            echo "Push не прошёл (кто-то запушил раньше) — подтягиваю изменения и пробую снова ($i/5)…"
            git pull --rebase origin HEAD
            sleep 3
          done
